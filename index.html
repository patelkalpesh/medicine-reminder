<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Reminder</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; max-width: 500px; margin: 0 auto; padding: 16px; padding-bottom: 80px; }
        h1 { text-align: center; color: #4CAF50; margin: 16px 0; font-size: 1.5rem; }
        .tab-bar { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #ddd; z-index: 100; }
        .tab-bar button { flex: 1; padding: 10px 4px; border: none; background: none; font-size: 0.7rem; cursor: pointer; color: #666; }
        .tab-bar button.active { color: #4CAF50; font-weight: bold; }
        .tab-bar button span { display: block; font-size: 1.2rem; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .med-name { font-weight: bold; font-size: 1.1rem; }
        .med-dose { color: #666; font-size: 0.9rem; }
        .med-timing { color: #4CAF50; font-size: 0.8rem; margin-top: 4px; }
        .btn { background: #4CAF50; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; width: 100%; margin-top: 12px; }
        .btn:hover { background: #43A047; }
        .btn-sm { padding: 6px 12px; width: auto; font-size: 0.8rem; margin: 4px 4px 0 0; border-radius: 6px; border: none; color: #fff; cursor: pointer; }
        .btn-edit { background: #FF9800; }
        .btn-del { background: #e53935; }
        .btn-take { background: #4CAF50; }
        .btn-skip { background: #9E9E9E; }
        .btn-export { background: #2196F3; margin: 4px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; margin-top: 8px; }
        label { font-size: 0.9rem; color: #555; display: block; margin-top: 12px; }
        .timing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
        .timing-chip { padding: 8px; border: 2px solid #ddd; border-radius: 8px; text-align: center; font-size: 0.8rem; cursor: pointer; }
        .timing-chip.selected { border-color: #4CAF50; background: #e8f5e9; color: #2e7d32; }
        .slot-group { margin-bottom: 16px; }
        .slot-group h3 { font-size: 0.9rem; color: #4CAF50; padding: 8px 0; border-bottom: 1px solid #eee; margin-bottom: 8px; }
        .dose-card { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #fafafa; border-radius: 8px; margin-bottom: 6px; }
        .dose-card.taken { opacity: 0.6; background: #e8f5e9; }
        .dose-card.skipped { opacity: 0.5; background: #fafafa; text-decoration: line-through; }
        .log-entry { padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .log-date-header { font-weight: bold; color: #4CAF50; padding: 12px 0 4px; font-size: 0.95rem; }
        .empty { text-align: center; color: #999; padding: 40px 16px; }
        .export-bar { display: flex; flex-wrap: wrap; justify-content: center; margin-top: 12px; }
        .summary { display: flex; gap: 8px; margin-bottom: 16px; }
        .summary-card { flex: 1; background: #fff; border-radius: 10px; padding: 12px; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
        .summary-card .num { font-size: 1.5rem; font-weight: bold; }
        .summary-card .lbl { font-size: 0.7rem; color: #666; }
    </style>
</head>
<body>
    <h1>💊 Medicine Reminder</h1>

    <!-- Home - Today's Schedule -->
    <div id="page-home" class="page active">
        <div id="summary" class="summary"></div>
        <div id="today-schedule"></div>
    </div>

    <!-- Medicines Master List -->
    <div id="page-meds" class="page">
        <div id="meds-list"></div>
        <button class="btn" onclick="showPage('add')">+ Add Medicine</button>
    </div>

    <!-- Add/Edit Medicine -->
    <div id="page-add" class="page">
        <div class="card">
            <h2 id="form-title" style="margin-bottom:8px;">Add Medicine</h2>
            <input type="hidden" id="edit-id" value="">
            <label>Medicine Name</label>
            <input type="text" id="med-name" placeholder="e.g. Paracetamol">
            <label>Dosage</label>
            <input type="text" id="med-dosage" placeholder="e.g. 500mg, 1 tablet">
            <label>How many times per day?</label>
            <select id="med-freq" onchange="updateTimingOptions()">
                <option value="1">Once daily</option>
                <option value="2">Twice daily</option>
                <option value="3">Three times daily</option>
            </select>
            <div id="timing-sections"></div>
            <button class="btn" onclick="saveMedicine()">Save Medicine</button>
            <button class="btn" style="background:#666;margin-top:8px;" onclick="cancelEdit()">Cancel</button>
        </div>
    </div>

    <!-- History -->
    <div id="page-history" class="page">
        <div class="card">
            <h2 style="margin-bottom:12px;">📋 History</h2>
            <div id="history-list"></div>
            <div class="export-bar">
                <button class="btn-sm btn-export" onclick="exportWhatsApp()">📱 WhatsApp</button>
                <button class="btn-sm btn-export" onclick="exportEmail()">📧 Email</button>
                <button class="btn-sm btn-export" onclick="exportPDF()">📄 PDF</button>
                <button class="btn-sm btn-export" onclick="exportExcel()">📊 Excel</button>
            </div>
        </div>
    </div>

    <!-- Sync -->
    <div id="page-sync" class="page">
        <div class="card">
            <h2 style="margin-bottom:12px;">☁️ Google Drive Sync</h2>
            <p style="font-size:0.85rem;color:#666;margin-bottom:12px;">Sign in to sync across devices.</p>
            <div id="sync-signed-out">
                <button class="btn" onclick="gDriveSignIn()">🔑 Sign in with Google</button>
            </div>
            <div id="sync-signed-in" style="display:none;">
                <div style="background:#e8f5e9;padding:12px;border-radius:8px;margin-bottom:12px;">
                    <strong>✅</strong> <span id="sync-email"></span>
                </div>
                <button class="btn" onclick="syncNow()" style="background:#2196F3;">🔄 Sync Now</button>
                <button class="btn" onclick="gDriveSignOut()" style="background:#666;margin-top:8px;">Sign Out</button>
                <div id="sync-status" style="font-size:0.8rem;color:#666;margin-top:12px;text-align:center;"></div>
            </div>
            <div id="last-sync-info" style="margin-top:12px;padding:10px;background:#f0f0f0;border-radius:8px;font-size:0.8rem;color:#555;text-align:center;"></div>
        </div>

        <div class="card">
            <h2 style="margin-bottom:12px;">🔔 Notifications</h2>
            <p style="font-size:0.85rem;color:#666;margin-bottom:12px;">Get reminders 30, 15, and 5 minutes before each dose.</p>
            <div id="notif-status"></div>
            <button class="btn" id="notif-btn" onclick="toggleNotifPermission()">Enable Notifications</button>
        </div>

        <div class="card" style="text-align:center;">
            <p style="font-size:0.75rem;color:#999;">💊 Medicine Reminder v2.1</p>
            <p style="font-size:0.7rem;color:#bbb;">Deployed: 21 Jun 2026</p>
        </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
        <button class="active" onclick="showPage('home')"><span>🏠</span>Today</button>
        <button onclick="showPage('meds')"><span>💊</span>Medicines</button>
        <button onclick="showPage('add')"><span>➕</span>Add</button>
        <button onclick="showPage('history')"><span>📋</span>History</button>
        <button onclick="showPage('sync')"><span>☁️</span>Sync</button>
    </div>

    <script>
        // === DATA ===
        function getMedicines() { return JSON.parse(localStorage.getItem('medicines2') || '[]'); }
        function saveMedicines(m) { localStorage.setItem('medicines2', JSON.stringify(m)); markUpdated(); }
        function getLogs() { return JSON.parse(localStorage.getItem('med_logs2') || '[]'); }
        function saveLogs(l) { localStorage.setItem('med_logs2', JSON.stringify(l)); markUpdated(); }
        function today() { return new Date().toISOString().split('T')[0]; }

        const TIMINGS = [
            'Before Breakfast', 'After Breakfast',
            'Before Lunch', 'After Lunch',
            'Before Dinner', 'After Dinner',
            'Bedtime'
        ];
        const TIMING_GROUPS = {
            'Morning': ['Before Breakfast', 'After Breakfast'],
            'Afternoon': ['Before Lunch', 'After Lunch'],
            'Evening': ['Before Dinner', 'After Dinner', 'Bedtime']
        };

        // === NAVIGATION ===
        const PAGES = ['home','meds','add','history','sync'];
        function showPage(name) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + name).classList.add('active');
            document.querySelectorAll('.tab-bar button').forEach((b, i) => b.classList.toggle('active', PAGES[i] === name));
            if (name === 'home') renderToday();
            if (name === 'meds') renderMedsList();
            if (name === 'history') renderHistory();
            if (name === 'sync') { updateNotifUI(); updateLastSync(); }
            if (name === 'add') { if (!document.getElementById('edit-id').value) resetForm(); }
        }

        // === MEDICINE FORM ===
        function updateTimingOptions() {
            const freq = parseInt(document.getElementById('med-freq').value);
            const container = document.getElementById('timing-sections');
            const labels = ['1st Dose', '2nd Dose', '3rd Dose'];
            const defaultTimes = ['08:00', '14:00', '20:00'];
            let html = '';
            for (let i = 0; i < freq; i++) {
                html += `<label>${labels[i]} - When?</label><div class="timing-grid">`;
                TIMINGS.forEach(t => {
                    html += `<div class="timing-chip" data-dose="${i}" data-timing="${t}" onclick="toggleTiming(this)">${t}</div>`;
                });
                html += `</div><label>${labels[i]} - Time</label><input type="time" id="dose-time-${i}" value="${defaultTimes[i]}">`;
            }
            container.innerHTML = html;
        }

        function toggleTiming(el) {
            // Only one timing per dose
            const dose = el.dataset.dose;
            document.querySelectorAll(`.timing-chip[data-dose="${dose}"]`).forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }

        function resetForm() {
            document.getElementById('form-title').textContent = 'Add Medicine';
            document.getElementById('edit-id').value = '';
            document.getElementById('med-name').value = '';
            document.getElementById('med-dosage').value = '';
            document.getElementById('med-freq').value = '1';
            updateTimingOptions();
        }

        function saveMedicine() {
            const name = document.getElementById('med-name').value.trim();
            const dosage = document.getElementById('med-dosage').value.trim();
            const freq = parseInt(document.getElementById('med-freq').value);
            if (!name) { alert('Enter medicine name'); return; }

            const timings = [];
            const times = [];
            for (let i = 0; i < freq; i++) {
                const sel = document.querySelector(`.timing-chip[data-dose="${i}"].selected`);
                if (!sel) { alert(`Select timing for dose ${i + 1}`); return; }
                timings.push(sel.dataset.timing);
                const timeVal = document.getElementById('dose-time-' + i).value;
                if (!timeVal) { alert(`Set time for dose ${i + 1}`); return; }
                times.push(timeVal);
            }

            const meds = getMedicines();
            const editId = document.getElementById('edit-id').value;
            if (editId) {
                const idx = meds.findIndex(m => m.id === editId);
                if (idx >= 0) meds[idx] = { ...meds[idx], name, dosage, freq, timings, times };
            } else {
                meds.push({ id: Date.now().toString(), name, dosage, freq, timings, times });
            }
            saveMedicines(meds);
            resetForm();
            showPage('meds');
        }

        function editMedicine(id) {
            const med = getMedicines().find(m => m.id === id);
            if (!med) return;
            document.getElementById('form-title').textContent = 'Edit Medicine';
            document.getElementById('edit-id').value = med.id;
            document.getElementById('med-name').value = med.name;
            document.getElementById('med-dosage').value = med.dosage;
            document.getElementById('med-freq').value = med.freq;
            updateTimingOptions();
            med.timings.forEach((t, i) => {
                const chip = document.querySelector(`.timing-chip[data-dose="${i}"][data-timing="${t}"]`);
                if (chip) chip.classList.add('selected');
                if (med.times && med.times[i]) document.getElementById('dose-time-' + i).value = med.times[i];
            });
            showPage('add');
        }

        function deleteMedicine(id) {
            if (!confirm('Delete this medicine?')) return;
            saveMedicines(getMedicines().filter(m => m.id !== id));
            renderMedsList();
        }

        function cancelEdit() { resetForm(); showPage('meds'); }

        // === MEDICINES LIST ===
        function renderMedsList() {
            const meds = getMedicines();
            const el = document.getElementById('meds-list');
            if (!meds.length) { el.innerHTML = '<div class="empty">No medicines yet. Tap + Add.</div>'; return; }
            el.innerHTML = meds.map(m => `<div class="card">
                <div class="med-name">${m.name}</div>
                <div class="med-dose">${m.dosage} • ${m.freq}x daily</div>
                <div class="med-timing">⏰ ${m.timings.map((t, i) => t + (m.times && m.times[i] ? ' @ ' + formatTime12(m.times[i]) : '')).join(', ')}</div>
                <div><button class="btn-sm btn-edit" onclick="editMedicine('${m.id}')">✏️ Edit</button><button class="btn-sm btn-del" onclick="deleteMedicine('${m.id}')">🗑️ Delete</button></div>
            </div>`).join('');
        }

        // === TODAY'S SCHEDULE ===
        function getTodayStatus() {
            const d = today();
            return getLogs().filter(l => l.date === d);
        }

        function renderToday() {
            const meds = getMedicines();
            const logs = getTodayStatus();
            const el = document.getElementById('today-schedule');
            const sum = document.getElementById('summary');

            if (!meds.length) { el.innerHTML = '<div class="empty">No medicines added yet.</div>'; sum.innerHTML = ''; return; }

            // Build all doses for today
            let allDoses = [];
            meds.forEach(m => {
                m.timings.forEach((timing, i) => {
                    const time = (m.times && m.times[i]) || '';
                    allDoses.push({ id: m.id, name: m.name, dosage: m.dosage, timing, time });
                });
            });

            const taken = logs.filter(l => l.action === 'taken').length;
            const skipped = logs.filter(l => l.action === 'skipped').length;
            const total = allDoses.length;
            sum.innerHTML = `
                <div class="summary-card"><div class="num" style="color:#2196F3">${total}</div><div class="lbl">Total</div></div>
                <div class="summary-card"><div class="num" style="color:#4CAF50">${taken}</div><div class="lbl">Taken</div></div>
                <div class="summary-card"><div class="num" style="color:#e53935">${skipped}</div><div class="lbl">Skipped</div></div>`;

            let html = '';
            Object.entries(TIMING_GROUPS).forEach(([group, timings]) => {
                const doses = allDoses.filter(d => timings.includes(d.timing));
                if (!doses.length) return;
                html += `<div class="slot-group"><h3>${group}</h3>`;
                doses.forEach(d => {
                    const log = logs.find(l => l.medId === d.id && l.timing === d.timing);
                    const cls = log ? (log.action === 'taken' ? 'taken' : 'skipped') : '';
                    const status = log ? (log.action === 'taken' ? ' ✅' : ' ⏭️') : '';
                    html += `<div class="dose-card ${cls}">
                        <div><strong>${d.name}</strong>${status}<br><small>${d.dosage} • ${d.timing}${d.time ? ' • 🕐' + formatTime12(d.time) : ''}</small></div>
                        <div>${log ? '' : `<button class="btn-sm btn-take" onclick="logDose('${d.id}','${d.timing}','taken')">Take</button><button class="btn-sm btn-skip" onclick="logDose('${d.id}','${d.timing}','skipped')">Skip</button>`}</div>
                    </div>`;
                });
                html += '</div>';
            });
            el.innerHTML = html || '<div class="empty">All done for today! 🎉</div>';
        }

        function logDose(medId, timing, action) {
            const logs = getLogs();
            logs.push({ medId, timing, action, date: today(), time: new Date().toISOString() });
            saveLogs(logs);
            renderToday();
        }

        // === HISTORY ===
        function renderHistory() {
            const logs = getLogs();
            const meds = getMedicines();
            const el = document.getElementById('history-list');
            if (!logs.length) { el.innerHTML = '<div class="empty">No history yet.</div>'; return; }

            // Group by date
            const grouped = {};
            logs.forEach(l => {
                if (!grouped[l.date]) grouped[l.date] = [];
                const med = meds.find(m => m.id === l.medId);
                grouped[l.date].push({ ...l, medName: med ? med.name : 'Unknown' });
            });

            let html = '';
            Object.keys(grouped).sort().reverse().forEach(date => {
                html += `<div class="log-date-header">${new Date(date).toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' })}</div>`;
                grouped[date].forEach(l => {
                    const icon = l.action === 'taken' ? '✅' : '⏭️';
                    const time = new Date(l.time).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
                    html += `<div class="log-entry">${icon} <strong>${l.medName}</strong> - ${l.timing} <span style="float:right;color:#666;font-size:0.8rem;">${time}</span></div>`;
                });
            });
            el.innerHTML = html;
        }

        // === EXPORTS ===
        function getExportText() {
            const logs = getLogs();
            const meds = getMedicines();
            let text = '💊 Medicine History\n\n';
            const grouped = {};
            logs.forEach(l => {
                if (!grouped[l.date]) grouped[l.date] = [];
                const med = meds.find(m => m.id === l.medId);
                grouped[l.date].push({ ...l, medName: med ? med.name : 'Unknown' });
            });
            Object.keys(grouped).sort().reverse().forEach(date => {
                text += `📅 ${date}\n`;
                grouped[date].forEach(l => {
                    const icon = l.action === 'taken' ? '✅' : '⏭️';
                    text += `  ${icon} ${l.medName} - ${l.timing}\n`;
                });
                text += '\n';
            });
            return text;
        }

        function exportWhatsApp() {
            const text = getExportText();
            window.open('https://wa.me/?text=' + encodeURIComponent(text));
        }

        function exportEmail() {
            const text = getExportText();
            window.open('mailto:?subject=Medicine History&body=' + encodeURIComponent(text));
        }

        function exportPDF() {
            const w = window.open('', '_blank');
            const logs = getLogs();
            const meds = getMedicines();
            let html = '<html><head><title>Medicine History</title><style>body{font-family:sans-serif;padding:20px}table{width:100%;border-collapse:collapse;margin-top:16px}th,td{border:1px solid #ddd;padding:8px;text-align:left}th{background:#4CAF50;color:#fff}</style></head><body>';
            html += '<h1>💊 Medicine History</h1><table><tr><th>Date</th><th>Medicine</th><th>Timing</th><th>Status</th><th>Time</th></tr>';
            logs.sort((a,b) => b.time.localeCompare(a.time)).forEach(l => {
                const med = meds.find(m => m.id === l.medId);
                html += `<tr><td>${l.date}</td><td>${med?med.name:'Unknown'}</td><td>${l.timing}</td><td>${l.action}</td><td>${new Date(l.time).toLocaleTimeString()}</td></tr>`;
            });
            html += '</table></body></html>';
            w.document.write(html);
            w.document.close();
            setTimeout(() => w.print(), 500);
        }

        function exportExcel() {
            const logs = getLogs();
            const meds = getMedicines();
            let csv = 'Date,Medicine,Dosage,Timing,Status,Time\n';
            logs.sort((a,b) => b.time.localeCompare(a.time)).forEach(l => {
                const med = meds.find(m => m.id === l.medId);
                csv += `${l.date},"${med?med.name:'Unknown'}","${med?med.dosage:''}",${l.timing},${l.action},${new Date(l.time).toLocaleTimeString()}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'medicine-history.csv';
            a.click();
        }

        // === HELPERS ===
        function formatTime12(t) {
            const [h, m] = t.split(':');
            const hr = parseInt(h);
            return (hr % 12 || 12) + ':' + m + (hr < 12 ? ' AM' : ' PM');
        }

        // === REMINDERS ===
        function requestNotifPermission() {
            if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
        }
        requestNotifPermission();

        function toggleNotifPermission() {
            if (!('Notification' in window)) { alert('Notifications not supported on this browser'); return; }
            if (Notification.permission === 'granted') { alert('Notifications already enabled!'); return; }
            if (Notification.permission === 'denied') { alert('Notifications blocked. Please enable in browser settings.'); return; }
            Notification.requestPermission().then(updateNotifUI);
        }
        function updateNotifUI() {
            const btn = document.getElementById('notif-btn');
            const status = document.getElementById('notif-status');
            if (!('Notification' in window)) { status.innerHTML = '<p style="color:#e53935;">❌ Not supported in this browser</p>'; btn.style.display = 'none'; return; }
            if (Notification.permission === 'granted') { status.innerHTML = '<p style="color:#4CAF50;">✅ Notifications enabled — reminders at 30, 15, 5 min before dose</p>'; btn.style.display = 'none'; }
            else if (Notification.permission === 'denied') { status.innerHTML = '<p style="color:#e53935;">🚫 Blocked — enable in browser settings</p>'; btn.textContent = 'Blocked (check browser settings)'; btn.style.background = '#999'; }
            else { status.innerHTML = '<p style="color:#FF9800;">⚠️ Not yet enabled</p>'; }
        }
        function updateLastSync() {
            const el = document.getElementById('last-sync-info');
            const ts = localStorage.getItem('data_updated');
            if (ts && parseInt(ts) > 0) { el.textContent = '🕐 Last synced: ' + new Date(parseInt(ts)).toLocaleString('en-IN'); }
            else { el.textContent = 'No sync yet'; }
        }

        function checkReminders() {
            if (!('Notification' in window) || Notification.permission !== 'granted') return;
            const meds = getMedicines();
            const logs = getTodayStatus();
            const now = new Date();
            const nowMin = now.getHours() * 60 + now.getMinutes();
            const reminded = JSON.parse(sessionStorage.getItem('reminded') || '{}');

            meds.forEach(m => {
                if (!m.times) return;
                m.timings.forEach((timing, i) => {
                    const log = logs.find(l => l.medId === m.id && l.timing === timing);
                    if (log) return; // already taken/skipped
                    const [h, min] = m.times[i].split(':').map(Number);
                    const doseMin = h * 60 + min;
                    const diff = doseMin - nowMin;
                    const key = m.id + '_' + i + '_' + today();

                    [30, 15, 5].forEach(before => {
                        const rkey = key + '_' + before;
                        if (diff <= before && diff > before - 1 && !reminded[rkey]) {
                            new Notification('💊 ' + m.name, { body: `${before} min before dose — ${timing} at ${formatTime12(m.times[i])}`, icon: 'icon-192.png' });
                            reminded[rkey] = true;
                        }
                    });
                    // At dose time
                    if (diff <= 0 && diff > -1 && !reminded[key + '_0']) {
                        new Notification('⏰ Take ' + m.name + ' NOW', { body: `${timing} — ${m.dosage}`, icon: 'icon-192.png' });
                        reminded[key + '_0'] = true;
                    }
                });
            });
            sessionStorage.setItem('reminded', JSON.stringify(reminded));
        }
        setInterval(checkReminders, 60000);
        setTimeout(checkReminders, 3000);

        // === SYNC ===
        function markUpdated() {
            localStorage.setItem('data_updated', String(Date.now()));
            if (accessToken) setTimeout(syncNow, 1000);
        }

        // Init
        updateTimingOptions();
        renderToday();
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>

    <script src="https://accounts.google.com/gsi/client"></script>
    <script>
        const GDRIVE_CLIENT_ID = '157005612520-70t1peegtr1uoinrnjv2g9uk1geni5j8.apps.googleusercontent.com';
        const GDRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/userinfo.email';
        const SYNC_FILE = 'medicine-reminder-data.json';
        let accessToken = null, tokenClient = null;

        function initGIS() {
            tokenClient = google.accounts.oauth2.initTokenClient({ client_id: GDRIVE_CLIENT_ID, scope: GDRIVE_SCOPE, callback: handleTokenResponse });
            const saved = localStorage.getItem('gdrive_token');
            if (saved) { const t = JSON.parse(saved); if (t.expiry > Date.now()) { accessToken = t.token; showSignedIn(t.email); } }
        }
        function gDriveSignIn() { tokenClient.requestAccessToken(); }
        function gDriveSignOut() {
            if (accessToken) google.accounts.oauth2.revoke(accessToken);
            accessToken = null; localStorage.removeItem('gdrive_token');
            document.getElementById('sync-signed-in').style.display = 'none';
            document.getElementById('sync-signed-out').style.display = 'block';
        }
        async function handleTokenResponse(resp) {
            if (resp.error) { alert('Sign-in failed'); return; }
            accessToken = resp.access_token;
            const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: 'Bearer ' + accessToken } }).then(r => r.json());
            const email = info.email || '';
            localStorage.setItem('gdrive_token', JSON.stringify({ token: accessToken, email, expiry: Date.now() + (resp.expires_in * 1000) }));
            showSignedIn(email);
            syncNow();
        }
        function showSignedIn(email) {
            document.getElementById('sync-signed-out').style.display = 'none';
            document.getElementById('sync-signed-in').style.display = 'block';
            document.getElementById('sync-email').textContent = email;
        }
        function setSyncStatus(msg) { document.getElementById('sync-status').textContent = msg; }

        async function driveRequest(url, opts = {}) {
            opts.headers = { ...opts.headers, Authorization: 'Bearer ' + accessToken };
            const r = await fetch(url, opts);
            if (r.status === 401) { gDriveSignOut(); throw new Error('Token expired'); }
            return r;
        }
        async function findSyncFile() {
            const r = await driveRequest('https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27' + SYNC_FILE + '%27&fields=files(id)');
            const d = await r.json(); return d.files && d.files[0];
        }
        async function downloadSyncFile(fileId) {
            return (await driveRequest('https://www.googleapis.com/drive/v3/files/' + fileId + '?alt=media')).json();
        }
        async function uploadSyncFile(content, existingId) {
            const meta = { name: SYNC_FILE, ...(existingId ? {} : { parents: ['appDataFolder'] }) };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
            form.append('file', new Blob([JSON.stringify(content)], { type: 'application/json' }));
            const url = existingId ? 'https://www.googleapis.com/upload/drive/v3/files/' + existingId + '?uploadType=multipart' : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
            await driveRequest(url, { method: existingId ? 'PATCH' : 'POST', body: form });
        }
        async function syncNow() {
            if (!accessToken) return;
            setSyncStatus('⏳ Syncing...');
            try {
                const local = { medicines: getMedicines(), logs: getLogs(), updatedAt: parseInt(localStorage.getItem('data_updated') || '0') };
                const file = await findSyncFile();
                if (file) {
                    const remote = await downloadSyncFile(file.id);
                    if (remote.updatedAt > local.updatedAt) {
                        localStorage.setItem('medicines2', JSON.stringify(remote.medicines || []));
                        localStorage.setItem('med_logs2', JSON.stringify(remote.logs || []));
                        localStorage.setItem('data_updated', String(remote.updatedAt));
                        renderToday();
                        setSyncStatus('✅ Downloaded • ' + new Date().toLocaleTimeString());
                    } else {
                        await uploadSyncFile(local, file.id);
                        setSyncStatus('✅ Uploaded • ' + new Date().toLocaleTimeString());
                    }
                } else {
                    local.updatedAt = Date.now(); localStorage.setItem('data_updated', String(local.updatedAt));
                    await uploadSyncFile(local);
                    setSyncStatus('✅ First sync • ' + new Date().toLocaleTimeString());
                }
            } catch (e) { setSyncStatus('❌ ' + e.message); }
        }
        async function pullFromDrive() {
            if (!accessToken) return;
            try {
                const file = await findSyncFile();
                if (file) {
                    const remote = await downloadSyncFile(file.id);
                    const localTs = parseInt(localStorage.getItem('data_updated') || '0');
                    if (remote.updatedAt > localTs) {
                        localStorage.setItem('medicines2', JSON.stringify(remote.medicines || []));
                        localStorage.setItem('med_logs2', JSON.stringify(remote.logs || []));
                        localStorage.setItem('data_updated', String(remote.updatedAt));
                        renderToday();
                        renderMedsList();
                    }
                }
            } catch(e) { console.log('Auto-pull failed:', e); }
        }
        window.addEventListener('load', () => {
            if (window.google) initGIS();
            setTimeout(pullFromDrive, 2000);
        });
        document.addEventListener('visibilitychange', () => { if (!document.hidden) pullFromDrive(); });
    </script>
